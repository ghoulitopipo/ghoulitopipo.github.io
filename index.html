<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeux en JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Choisissez un jeu</h1>
    <div id="menu">
        <button onclick="loadGame('snake')">Snake</button>
        <button onclick="loadGame('puissance4')">Puissance 4</button>
        <button onclick="loadGame('memory')">Memory</button>
    </div>
    <div id="game-container"></div>

    <script>
        function loadGame(game) {
            const gameContainer = document.getElementById('game-container');
            gameContainer.innerHTML = ''; // Réinitialise le conteneur

            // Utilisation de setTimeout pour différer l'exécution du script après le DOM update
            setTimeout(() => {
                const script = document.createElement('script');
                script.src = game + '.js';  // Charge le fichier JavaScript du jeu
                document.body.appendChild(script);
            }, 100);  // Délai court de 100 ms
        }
    </script>
</body>
</html>
