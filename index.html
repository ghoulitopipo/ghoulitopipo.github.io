<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Devinette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Devinez le Nombre !</h1>
        <p>Je pense à un nombre entre 1 et 100.</p>
        <input type="number" id="guess" placeholder="Entrez votre nombre">
        <button id="submitGuess">Soumettre</button>
        <p id="message"></p>
        <button id="restart" style="display:none;">Recommencer</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
